<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Md Shamim | AI Social Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* Navbar */

nav{
position:fixed;
top:0;
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

/* Logo */

.logo{
font-size:26px;
font-weight:700;
background:linear-gradient(120deg,#00eaff,#4facfe,#8e2de2,#00eaff);
background-size:250%;
-webkit-background-clip:text;
color:transparent;
animation:logoMove 6s linear infinite;
}

@keyframes logoMove{
0%{background-position:0%;}
100%{background-position:250%;}
}

/* Hero */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.profile{
width:150px;
height:150px;
border-radius:50%;
border:4px solid #00eaff;
box-shadow:0 0 30px #00eaff;
margin-bottom:20px;
}

.hero h1{
font-size:40px;
}

.hero p{
opacity:0.8;
margin:10px 0 20px 0;
}

.btn{
padding:12px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00f2ff,#ff00ea);
color:white;
cursor:pointer;
}

/* Social */

.social a{
margin:0 10px;
font-size:24px;
color:white;
}

.social a:hover{
color:#00eaff;
}

/* Floating AI button */

.chat-btn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#00eaff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:black;
cursor:pointer;
box-shadow:0 0 20px #00eaff;
}

/* Chat box */

.chatbox{
position:fixed;
bottom:90px;
right:20px;
width:300px;
background:#111;
border-radius:10px;
padding:15px;
display:none;
}

.messages{
height:200px;
overflow:auto;
font-size:14px;
margin-bottom:10px;
}

.chatbox input{
width:70%;
padding:8px;
border:none;
border-radius:5px;
}

.chatbox button{
padding:8px 10px;
border:none;
background:#00eaff;
cursor:pointer;
border-radius:5px;
}

</style>
</head>

<body>

<nav>
<div class="logo">Md Shamim</div>
<i class="fa fa-ellipsis-v"></i>
</nav>

<section class="hero">

<img src="shamim.jpg" class="profile">

<h1>Md Shamim</h1>

<p>AI Developer • Web Creator • Digital Innovator</p>

<button class="btn">Follow Me</button>

<div class="social">
<a href="https://wa.me/917557096331"><i class="fab fa-whatsapp"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-facebook"></i></a>
</div>

</section>

<!-- AI Chat -->

<div class="chatbox" id="chatbox">

<div class="messages" id="messages"></div>

<input id="userInput" placeholder="Ask AI...">
<button onclick="sendMessage()">Send</button>

</div>

<div class="chat-btn" onclick="toggleChat()">
<i class="fa fa-robot"></i>
</div>

<script>

function toggleChat(){
let chat=document.getElementById("chatbox");
chat.style.display = chat.style.display === "block" ? "none" : "block";
}

function sendMessage(){

let input=document.getElementById("userInput");
let msg=input.value;

if(msg==="") return;

let box=document.getElementById("messages");

box.innerHTML+=`<p><b>You:</b> ${msg}</p>`;

setTimeout(()=>{
box.innerHTML+=`<p><b>AI:</b> Hello 👋 How can I help you?</p>`;
box.scrollTop=box.scrollHeight;
},500);

input.value="";

}

</script>

</body>
</html>
