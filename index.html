*{  
margin:0;  
padding:0;  
box-sizing:border-box;  
font-family:'Poppins',sans-serif;  
}  
  
body{  
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);  
color:white;  
}  
  
/* Navbar */  
  
nav{  
position:fixed;  
top:0;  
width:100%;  
padding:15px 30px;  
display:flex;  
justify-content:space-between;  
align-items:center;  
background:rgba(0,0,0,0.4);  
backdrop-filter:blur(10px);  
}  
  
/* Logo */  
  
.logo{  
font-size:26px;  
font-weight:700;  
background:linear-gradient(120deg,#00eaff,#4facfe,#8e2de2,#00eaff);  
background-size:250%;  
-webkit-background-clip:text;  
color:transparent;  
animation:logoMove 6s linear infinite;  
}  
  
@keyframes logoMove{  
0%{background-position:0%;}  
100%{background-position:250%;}  
}  
  
/* Hero */  
  
.hero{  
height:100vh;  
display:flex;  
flex-direction:column;  
justify-content:center;  
align-items:center;  
text-align:center;  
}  
  
.profile{  
width:150px;  
height:150px;  
border-radius:50%;  
border:4px solid #00eaff;  
box-shadow:0 0 30px #00eaff;  
margin-bottom:20px;  
}  
  
.hero h1{  
font-size:40px;  
}  
  
.hero p{  
opacity:0.8;  
margin:10px 0 20px 0;  
}  
  
.btn{  
padding:12px 30px;  
border:none;  
border-radius:30px;  
background:linear-gradient(45deg,#00f2ff,#ff00ea);  
color:white;  
cursor:pointer;  
}  
  
/* Social */  
  
.social a{  
margin:0 10px;  
font-size:24px;  
color:white;  
}  
  
.social a:hover{  
color:#00eaff;  
}  
  
/* Floating AI button */

bottom:20px;  
right:20px;
